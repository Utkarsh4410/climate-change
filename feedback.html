<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Change | Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <img src="img13.jpg" width="40" height="40" alt="Logo">
            Climate Action
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="climate2.html">Evidence</a>
            <a href="climate3.html">Causes</a>
            <a href="feedback.html" class="active">Feedback</a>
        </div>
    </nav>

    <header class="hero" style="min-height: 40vh; padding-top: 10rem;">
        <div class="hero-content">
            <h1>We Value Your Voice</h1>
            <p>Have questions, suggestions, or want to get involved? Send us your feedback below.</p>
        </div>
    </header>

    <main class="container" style="padding-top: 2rem; max-width: 800px;">
        <div class="glass-card">
            <h2 class="section-title">Feedback Form</h2>
            
            <form onsubmit="alert('Thanks for your response!'); return false;">
                
                <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top: 0;">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" name="firstname" class="form-control" placeholder="Enter first name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="secondname" class="form-control" placeholder="Enter last name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Gender</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="male" required> Male
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="female" required> Female
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="other" required> Other
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="mail" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">City</label>
                    <select name="citychooser" class="form-control" required>
                        <option value="" disabled selected>Select your city</option>
                        <option value="del">Delhi</option>
                        <option value="agra">Agra</option>
                        <option value="jai">Jaipur</option>
                        <option value="blore">Bangalore</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Comment</label>
                    <textarea name="commentfield" class="form-control" placeholder="Share your thoughts with us..."></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Send Feedback</button>
                    <button type="reset" class="btn btn-secondary">Reset</button>
                </div>

            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Climate Action Project. Built with modern web technologies.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        });
        
        document.querySelectorAll('.glass-card').forEach((el) => {
            el.classList.add('animate-on-scroll');
            observer.observe(el);
        });
    </script>
</body>
</html>
